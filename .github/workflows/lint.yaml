name: Linting

on:
  push:
    branches:
      - "**"
  pull_request: 
    branches:
      - "main"
  workflow_dispatch:

jobs:
  lint:
     runs-on: ubuntu-latest
     steps:
       - name: Checkout code
         uses: actions/checkout@v4

       - name: Set up Python
         uses: actions/setup-python@v5
         with:
           python-version: '3.14.2'

       - name: Install ruff
         run: pip install ruff
         
       - name: Check linting
         run: ruff check .
            
            