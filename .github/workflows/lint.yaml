name: Linting

on:
  push:
    branches:
      - "**"
  pull_request: 
    branches:
      - "main"
  workflow_dispatch:

jobs:
  lint:
     runs-on: ubuntu-latest
     steps:
       - name: Checkout code
         uses: actions/checkout@v4
       - name: Set up Python
         uses: actions/setup-python@v5
         with:
           python-version: '3.14.2'
           cache: 'pip'
           cache-dependency-path: requirements.txt
       - name: Install dependencies
         run: |
           pip install -r requirements.txt
       - name: Check linting
         run: |
            ruff check .
            
            