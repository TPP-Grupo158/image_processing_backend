name: Unit Tests & Coverage

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "main"
  workflow_dispatch:

jobs:
  test:
    name: Run Pytest with Docker Compose
    runs-on: ubuntu-latest
    # GESTIÓN ESTRICTA DE PERMISOS:
    # Restablece "contents: read" para evitar el error 'exit code 128' (Repository Not Found),
    # y nos da permiso de escritura para que el bot pueda comentar el PR.
    permissions:
      contents: read
      pull-requests: write
      statuses: write

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      # 
      # OPTIMIZACIÓN DE ESPACIO DE DISCO
      # 
      # PyTorch + CUDA pesan casi 5GB al desempaquetar. Los runners gratuitos de GitHub colapsan
      # por falta de espacio (ENOSPC). Esta Action borra Android/Haskell/.NET de la máquina 
      # virtual, liberando >30GB antes de armar nuestra imagen de Docker.
      # FIX SUPPLY-CHAIN: Se clava la versión a @v1.3.1 en lugar de @main por seguridad.
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Ejecutar suite de pruebas
        # Las flags aseguran que el pipeline falle y se marque rojo si pytest retorna error.
        run: |
          docker compose -f docker-compose.test.yml up --build \
            --abort-on-container-exit \
            --exit-code-from test_runner

      - name: Extraer reporte de coverage
        if: always()
        # FIX DE ARQUITECTURA: Como eliminamos el "container_name" estático, usamos "docker compose cp" 
        # referenciando el nombre lógico del servicio (test_runner) para extraer el archivo XML.
        run: |
          docker compose -f docker-compose.test.yml cp test_runner:/code/coverage.xml ./coverage.xml || true

      # 
      # INTEGRACIÓN CONTINUA: REPORTE EN PR
      # 
      # FIX SUPPLY-CHAIN: Se clava a la versión oficial v1.1.51 en lugar de @main.
      - name: Pytest Coverage Commentator
        uses: MishaKav/pytest-coverage-comment@v1.1.51
        if: always() && github.event_name == 'pull_request'
        with:
          pytest-xml-coverage-path: ./coverage.xml
          title: "📊 Reporte de Cobertura de Tests (Grupo 158)"
          badge-title: Coverage
          hide-badge: false
          hide-report: false
          create-new-comment: false
          hide-comment: false
          report-only-changed-files: true