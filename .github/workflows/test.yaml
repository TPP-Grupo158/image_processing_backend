name: Unit Tests & Coverage

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "main"
  workflow_dispatch:

jobs:
  test:
    name: Run Pytest with Docker Compose
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      statuses: write

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      # 
      # LIBERAMOS ESPACIO EN EL RUNNER
      # 
      # Borra frameworks innecesarios (Android, .NET, Haskell) 
      # de la máquina de GitHub para hacerle lugar a PyTorch y CUDA.
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          # Mantenemos las herramientas base pero borramos los SDKs pesados
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Ejecutar suite de pruebas
        run: |
          docker compose -f docker-compose.test.yml up --build \
            --abort-on-container-exit \
            --exit-code-from test_runner

      - name: Extraer reporte de coverage
        if: always()
        run: |
          docker cp fast_api_tester:/code/coverage.xml ./coverage.xml || true

      - name: Pytest Coverage Commentator
        uses: MishaKav/pytest-coverage-comment@main
        if: always() && github.event_name == 'pull_request'
        with:
          pytest-xml-coverage-path: ./coverage.xml
          title: "📊 Reporte de Cobertura de Tests (Grupo 158)"
          badge-title: Coverage
          hide-badge: false
          hide-report: false
          create-new-comment: false
          hide-comment: false
          report-only-changed-files: true